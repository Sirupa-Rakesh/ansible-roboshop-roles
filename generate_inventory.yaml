- name: Generate dynamic inventory
  hosts: localhost
  gather_facts: no

  tasks:
    - name: Fetch running EC2 instances
      amazon.aws.ec2_instance_info:
        region: us-east-1                # మీ AWS region
        filters:
          instance-state-name: running
      register: ec2_info

    - name: Create inventory.ini file
      copy:
        dest: "./inventory.ini"
        content: |
          [web]
          {% for instance in ec2_info.instances %}
          {{ instance.public_ip_address }} ansible_user=ec2-user
          {% endfor %}
